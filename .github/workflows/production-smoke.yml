name: Production smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: HTTPS deployment URL to verify
        required: false
        default: https://crownmemedia.com
  deployment_status:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name != 'deployment_status' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || github.event.deployment_status.environment_url || 'https://crownmemedia.com' }}
      PRODUCTION_SMOKE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Verify deployed public routes
        run: bunx playwright test e2e/production-smoke.spec.ts --project=chromium-desktop --reporter=list
      - name: Preserve diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-diagnostics
          path: |
            playwright-report
            test-results
          retention-days: 14
