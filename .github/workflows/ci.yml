name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Public anon key is safe to expose; service key + secrets are only in repo secrets.
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}

jobs:
  static-checks:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build (typecheck)
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test

  e2e:
    name: Playwright e2e + share-card regression
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit
      - name: Run Playwright (mobile + desktop, share-card + carousel + verification)
        run: bunx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  browserstack-ios:
    name: BrowserStack iOS Safari (optional)
    needs: static-checks
    runs-on: ubuntu-latest
    # Only runs when both BrowserStack secrets are configured at the repo level.
    if: ${{ secrets.BROWSERSTACK_USERNAME != '' && secrets.BROWSERSTACK_ACCESS_KEY != '' }}
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run BrowserStack iOS Safari smoke
        # Placeholder: wired up only when a BrowserStack config is committed.
        # The job is gated on secrets above, so absence of secrets => no failure.
        run: |
          if [ -f browserstack.yml ]; then
            bunx browserstack-node-sdk playwright test --project=browserstack-ios-safari
          else
            echo "browserstack.yml not present yet — skipping (see e2e/README.md to enable)."
          fi
