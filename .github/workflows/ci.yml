name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Public anon key is safe to expose; service key + secrets are only in repo secrets.
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}

jobs:
  static-checks:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Fall back to tracked public env when secrets are absent
        shell: bash
        run: |
          if [[ -z "${VITE_SUPABASE_URL}" ]]; then
            echo "VITE secrets not configured; using tracked .env browser-public values."
            grep -E '^VITE_' .env >> "$GITHUB_ENV"
          fi
      - run: bun install --frozen-lockfile
      - name: TypeScript type-check
        run: bun run typecheck
      - name: Production build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test

  e2e:
    name: Playwright e2e + share-card regression
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit
      - name: Run Playwright (full suite with fixture, hermetic smoke otherwise)
        shell: bash
        run: |
          if [[ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Service-role fixture available: running the full Playwright suite."
            bunx playwright test
          else
            echo "No service-role fixture: running the hermetic browser smoke suite."
            bunx playwright test \
              e2e/discover-suggested-creator-nav.spec.ts \
              e2e/profile-follow-refresh.spec.ts \
              e2e/rewards.spec.ts \
              e2e/royal-pass-admin-only-visibility.spec.ts
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  browserstack-ios:
    name: BrowserStack iOS Safari (optional)
    needs: static-checks
    runs-on: ubuntu-latest
    # Job-level conditions cannot access the secrets context. Opt in with the
    # repository variable after both BrowserStack secrets are configured.
    if: ${{ vars.BROWSERSTACK_ENABLED == 'true' }}
    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run BrowserStack iOS Safari smoke
        # Placeholder: wired up only when a BrowserStack config is committed.
        # The job is gated on secrets above, so absence of secrets => no failure.
        run: |
          if [ -f browserstack.yml ]; then
            bunx browserstack-node-sdk playwright test --project=browserstack-ios-safari
          else
            echo "browserstack.yml not present yet — skipping (see e2e/README.md to enable)."
          fi
