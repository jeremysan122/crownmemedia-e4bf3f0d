name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Public anon key is safe to expose; service key + secrets are only in repo secrets.
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}

jobs:
  static-checks:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TypeScript type-check
        run: bun run typecheck
      - name: Production build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test

  e2e:
    name: Playwright e2e + share-card regression
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit
      - name: Run Playwright (full suite with fixture, hermetic smoke otherwise)
        shell: bash
        run: |
          if [[ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Service-role fixture available: running the full Playwright suite."
            bunx playwright test
          else
            echo "No service-role fixture: running the hermetic browser smoke suite."
            bunx playwright test \
              e2e/discover-suggested-creator-nav.spec.ts \
              e2e/profile-follow-refresh.spec.ts \
              e2e/rewards.spec.ts \
              e2e/royal-pass-admin-only-visibility.spec.ts
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  browserstack-production:
    name: BrowserStack production browser matrix
    needs: static-checks
    runs-on: ubuntu-latest
    # Job-level conditions cannot access the secrets context. Opt in with the
    # repository variable after both BrowserStack secrets are configured.
    # Forked PRs cannot receive repository secrets, so do not start a remote
    # session for them. Pushes and same-repository PRs remain gated.
    if: >-
      ${{ vars.BROWSERSTACK_ENABLED == 'true' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository) }}
    env:
      BROWSERSTACK_ENABLED: "true"
      PLAYWRIGHT_BASE_URL: https://crownmemedia.com
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install pinned BrowserStack SDK
        run: bun add --dev --exact --no-save browserstack-node-sdk@1.63.6
      - name: Configure BrowserStack environment
        uses: browserstack/github-actions/setup-env@1ab56d9521ce20f4651bb5d9f3ef39c5ba54805a
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          build-name: CrownMe-${{ github.run_id }}-${{ github.run_attempt }}
          project-name: CrownMe production
      - name: Start verified BrowserStack Local tunnel
        uses: browserstack/github-actions/setup-local@1ab56d9521ce20f4651bb5d9f3ef39c5ba54805a
        with:
          local-testing: start
          local-logging-level: all-logs
          local-identifier: random
          local-args: --force-local
      - name: Run production BrowserStack smoke
        run: >-
          bunx browserstack-node-sdk playwright test
          e2e/production-browser-smoke.spec.ts
          --project=browserstack-production
      - name: Stop BrowserStack Local tunnel
        if: always()
        uses: browserstack/github-actions/setup-local@1ab56d9521ce20f4651bb5d9f3ef39c5ba54805a
        with:
          local-testing: stop
