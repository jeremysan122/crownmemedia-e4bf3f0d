name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Public anon key is safe to expose; service key + secrets are only in repo secrets.
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
  VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
  VITE_PAYMENTS_CLIENT_TOKEN: ${{ secrets.VITE_PAYMENTS_CLIENT_TOKEN }}

jobs:
  static-checks:
    name: Type-check, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Fall back to tracked public env when secrets are absent
        shell: bash
        run: |
          if [[ -z "${VITE_SUPABASE_URL}" ]]; then
            echo "VITE secrets not configured; using tracked .env browser-public values."
            grep -E '^VITE_' .env >> "$GITHUB_ENV"
          fi
      - run: bun install --frozen-lockfile
      - name: TypeScript type-check
        run: bun run typecheck
      - name: Production build
        run: bun run build
      - name: Lint
        run: bun run lint
      - name: Unit tests
        run: bun run test

  e2e:
    name: Playwright e2e + share-card regression
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      E2E_ADMIN_USER_ID: ${{ secrets.E2E_ADMIN_USER_ID }}
      E2E_USER_A_EMAIL: ${{ secrets.E2E_USER_A_EMAIL }}
      E2E_USER_A_ID: ${{ secrets.E2E_USER_A_ID }}
      E2E_USER_A_PASSWORD: ${{ secrets.E2E_USER_A_PASSWORD }}
      E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
      E2E_USER_B_ID: ${{ secrets.E2E_USER_B_ID }}
      E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
      E2E_USER_B_USERNAME: ${{ secrets.E2E_USER_B_USERNAME }}
      E2E_USER_C_EMAIL: ${{ secrets.E2E_USER_C_EMAIL }}
      E2E_USER_C_ID: ${{ secrets.E2E_USER_C_ID }}
      E2E_USER_C_PASSWORD: ${{ secrets.E2E_USER_C_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Fall back to tracked public env when secrets are absent
        shell: bash
        run: |
          if [[ -z "${VITE_SUPABASE_URL}" ]]; then
            echo "VITE secrets not configured; using tracked .env browser-public values."
            grep -E '^VITE_' .env >> "$GITHUB_ENV"
          fi
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit
      - name: Run Playwright (full suite with fixture, hermetic smoke otherwise)
        shell: bash
        run: |
          if [[ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Service-role fixture available: running the full Playwright suite."
            bunx playwright test
          else
            echo "No service-role fixture: running the hermetic browser smoke suite."
            bunx playwright test \
              e2e/discover-suggested-creator-nav.spec.ts \
              e2e/profile-follow-refresh.spec.ts \
              e2e/rewards.spec.ts \
              e2e/royal-pass-admin-only-visibility.spec.ts
          fi
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  browserstack-ios:
    name: BrowserStack real iOS Safari staging gate
    needs: static-checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Secrets cannot be referenced in a job-level condition. Enable the job
    # only after the preflight values below have been added to GitHub.
    if: ${{ vars.BROWSERSTACK_ENABLED == 'true' && vars.STAGING_BASE_URL != '' }}
    env:
      BROWSERSTACK_ENABLED: "true"
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      E2E_USER_C_EMAIL: ${{ secrets.E2E_USER_C_EMAIL }}
      E2E_USER_C_PASSWORD: ${{ secrets.E2E_USER_C_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Validate BrowserStack staging configuration
        shell: bash
        run: |
          missing=()
          for name in \
            BROWSERSTACK_USERNAME \
            BROWSERSTACK_ACCESS_KEY \
            PLAYWRIGHT_BASE_URL \
            E2E_USER_C_EMAIL \
            E2E_USER_C_PASSWORD
          do
            if [[ -z "${!name}" ]]; then missing+=("${name}"); fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required BrowserStack staging values: ${missing[*]}" >&2
            exit 1
          fi

          if [[ "${PLAYWRIGHT_BASE_URL%/}" == "https://crownmemedia.com" ]]; then
            echo "Refusing to run the controlled-user BrowserStack suite against production." >&2
            exit 1
          fi

      - name: Configure BrowserStack build metadata
        uses: browserstack/github-actions/setup-env@master
        with:
          username: ${{ secrets.BROWSERSTACK_USERNAME }}
          access-key: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          project-name: CrownMe
          build-name: "iOS staging - BUILD_INFO"
      - name: Run BrowserStack iOS Safari smoke
        run: >-
          bunx browserstack-node-sdk@1.63.6 playwright test
          e2e/staging-auth-smoke.spec.ts
          e2e/crown-categories-mobile.spec.ts
          --project=browserstack-ios-safari
          --workers=1
      - name: Upload BrowserStack Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browserstack-ios-playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
